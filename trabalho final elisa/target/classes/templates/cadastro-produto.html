    <!DOCTYPE html>
    <html lang="pt-br" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
        <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title th:text="${produto.idProduto == 0 ? 'Cadastrar Produto' : 'Editar Produto'}">Cadastrar Produto</title>
            <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
            <link rel="stylesheet" th:href="@{/css/app.css}">
        </head>
        <body class="bg-light">
            <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
                <div class="container">
                    <a class="navbar-brand" th:href="@{/produtos}">FATEC Catálogo</a>

                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                        <span class="navbar-toggler-icon"></span>
                    </button>

                    <div class="collapse navbar-collapse" id="navbarNav">
                        <ul class="navbar-nav me-auto">
                            <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                                <a class="nav-link" th:href="@{/produtos}">Produtos</a>
                            </li>
                            <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                                <a class="nav-link" th:href="@{/produtos/historico}">Histórico</a>
                            </li>
                            <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                                <a class="nav-link" th:href="@{/categorias/novo}">Nova Categoria</a>
                            </li>
                            <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                                <a class="nav-link" th:href="@{/usuarios/novo}">Novo usuário</a>
                            </li>
                        </ul>

                        <div class="d-flex align-items-center">
                            <span class="navbar-text text-white me-3" sec:authorize="isAuthenticated()">
                                Olá, <strong sec:authentication="name">Usuário</strong>
                            </span>

                            <form th:action="@{/logout}" method="post" sec:authorize="isAuthenticated()">
                                <button type="submit" class="btn btn-light btn-sm text-primary fw-bold">Sair</button>
                            </form>
                        </div>
                    </div>
                </div>
            </nav>

            <div class="container">
                <div class="card shadow mx-auto" style="max-width: 500px;">
                    <div class="card-header bg-white">
                        <h2 class="mb-0" th:text="${produto.idProduto == 0 ? 'Novo Produto' : 'Editar Produto'}">Novo Produto</h2>
                    </div>
                    <div class="card-body">
                        <form th:action="@{/produtos/salvar}" th:object="${produto}" method="post"
                              onsubmit="return confirm(this.dataset.confirmMessage)"
                              th:data-confirm-message="${produto.idProduto == 0 ? 'Confirma o cadastro deste produto?' : 'Confirma a alteração deste produto?'}">
                            <input type="hidden" th:field="*{idProduto}">

                            <div class="mb-3">
                                <label class="form-label">Nome do Produto</label>
                                <input type="text" th:field="*{nome}"
                                       th:classappend="${#fields.hasErrors('nome')} ? 'is-invalid' : ''"
                                       class="form-control">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}"></div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Valor (R$)</label>
                                <input type="number" step="0.01" th:field="*{valor}"
                                       th:classappend="${#fields.hasErrors('valor')} ? 'is-invalid' : ''"
                                       class="form-control">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('valor')}" th:errors="*{valor}"></div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Quantidade em Estoque</label>
                                <input type="number" min="0" step="1" th:field="*{quantidade}"
                                       th:classappend="${#fields.hasErrors('quantidade')} ? 'is-invalid' : ''"
                                       class="form-control">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('quantidade')}" th:errors="*{quantidade}"></div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Categoria</label>
                                <select th:field="*{categoria}" class="form-select" required>
                                    <option value="" disabled selected>Selecione uma categoria...</option>
                                    <option th:each="cat : ${categorias}"
                                            th:value="${cat.idCategoria}"
                                            th:text="${cat.nome}">
                                    </option>
                                </select>
                                <div class="text-danger" th:if="${#fields.hasErrors('categoria')}" th:errors="*{categoria}"></div>
                            </div>

                            <div class="mt-4">
                                <button type="submit" class="btn btn-primary"
                                        th:text="${produto.idProduto == 0 ? 'Salvar Produto' : 'Salvar Alterações'}">Salvar Produto</button>
                                <a th:href="@{/produtos}" class="btn btn-secondary">Cancelar</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
            <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
        </body>
    </html>
