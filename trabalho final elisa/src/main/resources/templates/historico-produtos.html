<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Histórico de Atualizações</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
    <div class="container">
        <a class="navbar-brand" th:href="@{/produtos}">FATEC Catálogo</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/produtos}">Produtos</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link active" th:href="@{/produtos/historico}">Histórico</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/categorias/novo}">Nova Categoria</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/usuarios/novo}">Novo usuário</a>
                </li>
            </ul>

            <div class="d-flex align-items-center">
                <span class="navbar-text text-white me-3" sec:authorize="isAuthenticated()">
                    Olá, <strong sec:authentication="name">Usuário</strong>
                </span>

                <form th:action="@{/logout}" method="post" sec:authorize="isAuthenticated()">
                    <button type="submit" class="btn btn-light btn-sm text-primary fw-bold">Sair</button>
                </form>
            </div>
        </div>
    </div>
</nav>

<div class="container">
    <div class="card shadow">
        <div class="card-header bg-white d-flex justify-content-between align-items-center">
            <h2 class="mb-0">Auditoria de Produtos</h2>
            <a th:href="@{/produtos}" class="btn btn-secondary">Voltar</a>
        </div>
        <div class="card-body">
            <table class="table table-hover align-middle">
                <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Produto</th>
                    <th>Categoria</th>
                    <th>Estoque</th>
                    <th>Preço (R$)</th>
                    <th>Última Atualização</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="p : ${produtos}" th:classappend="${p.quantidade != null and p.quantidade < 5} ? 'table-warning' : ''">
                    <td th:text="${p.idProduto}"></td>
                    <td th:text="${p.nome}"></td>
                    <td th:text="${p.categoria != null ? p.categoria.nome : 'Sem Categoria'}"></td>
                    <td>
                        <span th:text="${p.quantidade != null ? p.quantidade : 0}"
                              th:classappend="${p.quantidade != null and p.quantidade < 5} ? 'badge bg-danger' : 'badge bg-success'"></span>
                    </td>
                    <td th:text="${#numbers.formatDecimal(p.valor, 1, 'POINT', 2, 'COMMA')}"></td>
                    <td th:text="${p.dataCadastro != null ? #temporals.format(p.dataCadastro, 'dd/MM/yyyy HH:mm:ss') : 'Sem registro'}"></td>
                </tr>
                </tbody>
            </table>

            <div th:if="${#lists.isEmpty(produtos)}" class="alert alert-info text-center">
                Nenhum produto cadastrado.
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
